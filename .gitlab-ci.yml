stages:
  - test
  - build
  - deploy

variables:
  IMAGE: "$CI_REGISTRY_IMAGE"
  TAG: "$CI_COMMIT_SHORT_SHA"
  SERVICE_NAME: "dns-encrypted-proxy"

test:
  stage: test
  image: alpine:latest
  tags:
    - docker
  before_script:
    - apk add --no-cache cmake make gcc musl-dev curl-dev openssl-dev cmocka-dev pkgconfig python3
  script:
    - mkdir -p build
    - cd build
    - cmake -DBUILD_TESTS=ON -DWARNINGS_AS_ERRORS=ON -DENABLE_UPSTREAM_DOH=ON -DENABLE_UPSTREAM_DOT=ON -DENABLE_UPSTREAM_DOQ=ON ..
    - cmake --build . -j
    - ctest --output-on-failure
  artifacts:
    when: on_failure
    paths:
      - build/Testing/
    expire_in: 1 week

build:
  stage: build
  image: docker:24
  tags:
    - docker
    - unraid
  script:
    - docker info
    - docker login -u gitlab-ci-token -p "$CI_JOB_TOKEN" "$CI_REGISTRY"
    - docker build --pull -t "$IMAGE:$TAG" .
    - docker run -d --rm --name dns-encrypted-proxy-smoke "$IMAGE:$TAG" /app/dns-encrypted-proxy /app/dns-encrypted-proxy.conf.example
    - sleep 2
    - test -n "$(docker ps --filter name=dns-encrypted-proxy-smoke -q)"
    - docker stop dns-encrypted-proxy-smoke
    - docker push "$IMAGE:$TAG"
  needs:
    - test

.deploy_template: &deploy_template
  stage: deploy
  image: alpine
  tags:
    - docker
    - unraid
  variables:
    UNRAID_SSH_KEY: $UNRAID_SSH_KEY
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$UNRAID_SSH_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan "$UNRAID_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      ssh root@"$UNRAID_HOST" <<EOF
      echo "$CI_JOB_TOKEN" | docker login -u gitlab-ci-token --password-stdin "$CI_REGISTRY"
      docker pull "$IMAGE:$TAG"
      docker stop $SERVICE_NAME || true
      docker rm $SERVICE_NAME || true
      docker run -d \
        --name $SERVICE_NAME \
        -l net.unraid.docker.managed=dockerman \
        --restart unless-stopped \
        --network bridge \
        -v /mnt/cache/appdata/dns-encrypted-proxy:/app/config \
        -p 5053:53/udp \
        -p 5053:53/tcp \
        -p 9090:9090/tcp \
        -e CACHE_CAPACITY=8192 \
        "$IMAGE:$TAG"
      EOF
  only:
    - master

deploy:
  <<: *deploy_template
  parallel:
    matrix:
      - UNRAID_HOST: "172.20.0.50"
      - UNRAID_HOST: "192.168.1.50"
